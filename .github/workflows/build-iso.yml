name: Build TelaOS for UTM
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools grub-pc-bin grub-common wget binutils

      - name: Prepare ISO Structure
        run: |
          mkdir -p iso_root/boot/grub
          mkdir -p iso_root/casper
          # Pulling the real kernel engine (vmlinuz) and initrd for x86_64
          wget -q https://ubuntu.com -O iso_root/casper/vmlinuz
          wget -q https://ubuntu.com -O iso_root/casper/initrd.gz
          # Copy your Web OS files into the root
          cp index.html styles.css app.js drivers.js apphandler.js apps.json iso_root/

      - name: Configure GRUB
        run: |
          cat <<EOF > iso_root/boot/grub/grub.cfg
          set timeout=0
          set default=0
          menuentry "TelaOS" {
              linux /casper/vmlinuz quiet splash dwc_otg.lpm_enable=0 root=/dev/ram0
              initrd /casper/initrd.gz
          }
          EOF

      - name: Create Hybrid ISO
        run: |
          # grub-mkrescue is the safest way to avoid exit code 32 on GitHub
          grub-mkrescue -o TelaOS-UTM.iso iso_root -- -volid "TELAOS"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelaOS-Package
          path: TelaOS-UTM.iso
