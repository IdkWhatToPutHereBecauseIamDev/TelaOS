name: Build TelaOS for UTM
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools grub-pc-bin grub-common wget

      - name: Prepare ISO Files
        run: |
          mkdir -p iso_root/boot/grub
          mkdir -p iso_root/casper
          # Injecting a real minimal kernel so UTM recognizes the boot format
          wget http://ubuntu.com -O iso_root/casper/vmlinuz
          wget http://ubuntu.com -O iso_root/casper/initrd.gz
          # Copy your Web OS files
          cp index.html styles.css app.js drivers.js apphandler.js apps.json iso_root/

      - name: Configure GRUB
        run: |
          cat <<EOF > iso_root/boot/grub/grub.cfg
          set timeout=0
          menuentry "TelaOS" {
              linux /casper/vmlinuz quiet splash
              initrd /casper/initrd.gz
          }
          EOF

      - name: Build Hybrid ISO
        run: grub-mkrescue -o TelaOS-Final.iso iso_root

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TelaOS-UTM-Ready
          path: TelaOS-Final.iso
