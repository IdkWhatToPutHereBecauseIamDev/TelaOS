name: Build TelaOS for UTM
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # mtools and grub-pc-bin are mandatory for a valid hybrid ISO
          sudo apt-get install -y xorriso mtools grub-pc-bin grub-common wget

      - name: Prepare ISO root
        run: |
          mkdir -p iso_root/boot/grub
          mkdir -p iso_root/casper
          # Download a real kernel so UTM detects a bootable OS
          wget -q https://ubuntu.com -O iso_root/casper/vmlinuz
          wget -q https://ubuntu.com -O iso_root/casper/initrd.gz
          # Copy your TelaOS web files
          cp index.html styles.css app.js drivers.js apphandler.js apps.json iso_root/

      - name: Create GRUB config
        run: |
          cat <<EOF > iso_root/boot/grub/grub.cfg
          set timeout=0
          set default=0
          menuentry "TelaOS" {
              linux /casper/vmlinuz quiet splash
              initrd /casper/initrd.gz
          }
          EOF

      - name: Build Hybrid ISO
        run: |
          # Use -d to point to the installed BIOS modules, preventing error 32
          grub-mkrescue -d /usr/lib/grub/i386-pc -o TelaOS-Final.iso iso_root

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: TelaOS-UTM-Ready
          path: TelaOS-Final.iso
