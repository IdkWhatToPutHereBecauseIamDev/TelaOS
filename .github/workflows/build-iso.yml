name: Build TelaOS for UTM
on: [push, workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ISO Boot Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso isolinux syslinux-common mtools grub-pc-bin

      - name: Create Boot Structure
        run: |
          mkdir -p iso_root/isolinux
          mkdir -p iso_root/casper
          # Copying the essential bootloader files UTM looks for
          cp /usr/lib/ISOLINUX/isolinux.bin iso_root/isolinux/
          cp /usr/lib/syslinux/modules/bios/* iso_root/isolinux/

      - name: Inject Linux Kernel (The Engine)
        run: |
          # UTM needs an actual kernel file to recognize the format
          wget http://ubuntu.com -O iso_root/casper/vmlinuz
          wget http://ubuntu.com -O iso_root/casper/initrd.gz

      - name: Create Isolinux Config
        run: |
          cat <<EOF > iso_root/isolinux/isolinux.cfg
          default telaos
          label telaos
            kernel /casper/vmlinuz
            append initrd=/casper/initrd.gz quiet splash
          EOF

      - name: Build Hybrid ISO (UTM Compatible)
        run: |
          xorrisofs -o TelaOS-UTM.iso \
            -b isolinux/isolinux.bin -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -J -R -V "TELAOS" iso_root

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TelaOS-UTM-Ready
          path: TelaOS-UTM.iso
