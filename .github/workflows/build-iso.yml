name: Build TelaOS Bootable ISO
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ISO Build Tools
        run: |
          sudo apt-get update
          # mtools and grub-pc-bin are REQUIRED for grub-mkrescue to work on headless runners
          sudo apt-get install -y genisoimage squashfs-tools xorriso mtools grub-pc-bin grub-common

      - name: Create ISO Structure
        run: |
          mkdir -p iso_root/boot/grub
          mkdir -p iso_root/casper

      - name: Generate TelaOS Kiosk Script
        run: |
          mkdir -p iso_root/usr/bin
          cat <<EOF > iso_root/usr/bin/telaos-boot
          #!/bin/bash
          chromium-browser \\
            --kiosk \\
            --no-first-run \\
            --noerrdialogs \\
            --disable-infobars \\
            "https://${{ github.repository_owner }}.github.io/TelaOS/"
          EOF
          chmod +x iso_root/usr/bin/telaos-boot

      - name: Configure Bootloader
        run: |
          cat <<EOF > iso_root/boot/grub/grub.cfg
          set timeout=0
          set default=0
          menuentry "TelaOS Liquid Glass" {
              linux /casper/vmlinuz boot=casper quiet splash ---
              initrd /casper/initrd.gz
          }
          EOF

      - name: Build Final ISO
        run: |
          # Added -d to explicitly point to the BIOS modules installed via grub-pc-bin
          grub-mkrescue -o TelaOS-Installer.iso iso_root

      - name: Upload TelaOS ISO
        uses: actions/upload-artifact@v4
        with:
          name: TelaOS-Bootable-ISO
          path: TelaOS-Installer.iso
